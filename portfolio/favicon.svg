<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- The resident, as the tab icon: black against a light browser
       chrome, white against a dark one. -->
  <style>
    image { filter: brightness(0); }
    @media (prefers-color-scheme: dark) {
      image { filter: brightness(0) invert(1); }
    }
  </style>
  <image href="data:image/png;base64," width="128" height="128"/>
</svg>
